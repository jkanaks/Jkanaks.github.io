<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ioannis Kanakis // Personal Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
    <style>
        :root {
            --bg-base: #1a1a1a; /* Dark background */
            --text-main: #e0e0e0; /* Light grey text */
            --accent-color: #4a90e2; /* Softer blue accent */
            --card-bg: #2a2a2a; /* Slightly darker background for cards */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 1.6;
        }

        body {
            background-color: var(--bg-base); /* Dark background */
            color: var(--text-main); /* Light grey text */
            font-family: 'Merriweather', serif; /* Serif font for body */
        }

        /* Subtle Data Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Removed data grid background */
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Typography */
        h1, h2, h3 {
            font-family: 'Lato', sans-serif; /* Sans-serif for headings */
            color: #ffffff;
            margin-bottom: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            margin-bottom: 40px;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100px;
            height: 2px;
            /* Removed neon line */
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 0.85rem;
            color: #6b7280;
        }
    </style>
</head>
<body>

    <div class="container">
        {{ content }}
    </div>

</body>
</html>
